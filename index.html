<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>GuardTrack - Security Schedule</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <aside class="sidebar" id="sidebar">
        <div class="sidebar-header">
            <h2>GuardTrack</h2>
        </div>
        <nav class="sidebar-nav">
            <a href="#" class="active">
                <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="3" y="3" width="7" height="9"></rect><rect x="14" y="3" width="7" height="5"></rect><rect x="14" y="12" width="7" height="9"></rect><rect x="3" y="16" width="7" height="5"></rect></svg>
                Dashboard
            </a>
            <a href="#">
                <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"></path><polyline points="14 2 14 8 20 8"></polyline><line x1="16" y1="13" x2="8" y2="13"></line><line x1="16" y1="17" x2="8" y2="17"></line><polyline points="10 9 9 9 8 9"></polyline></svg>
                History
            </a>
        </nav>
    </aside>

    <div class="main-wrapper">
        <header class="top-bar">
            <div class="top-bar-content">
                <div>
                    <h1 class="page-title">Schedules</h1>
                    <p class="current-date" id="header-date">Loading date...</p>
                </div>
                <div class="top-actions desktop-only">
                    <button class="btn-primary" onclick="openModal()">+ Add Schedule</button>
                </div>
            </div>
        </header>

        <main class="main-content">
            <div id="schedule-container" class="grid-container">
            </div>
        </main>
    </div>

    <nav class="bottom-nav">
        <a href="#" class="active">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="3" y="3" width="7" height="9"></rect><rect x="14" y="3" width="7" height="5"></rect><rect x="14" y="12" width="7" height="9"></rect><rect x="3" y="16" width="7" height="5"></rect></svg>
            <span>Home</span>
        </a>
        <a href="#">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"></path><polyline points="14 2 14 8 20 8"></polyline><line x1="16" y1="13" x2="8" y2="13"></line><line x1="16" y1="17" x2="8" y2="17"></line><polyline points="10 9 9 9 8 9"></polyline></svg>
            <span>History</span>
        </a>
    </nav>

    <button class="fab" onclick="openModal()">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><line x1="12" y1="5" x2="12" y2="19"></line><line x1="5" y1="12" x2="19" y2="12"></line></svg>
    </button>

    <div class="modal-overlay" id="modal-overlay">
        <div class="modal-content">
            <div class="modal-header">
                <h3 id="modal-title">New Schedule</h3>
                <button class="close-btn" onclick="closeModal()">&times;</button>
            </div>
            <form id="schedule-form">
                <input type="hidden" id="schedule-id">
                <div class="form-group">
                    <label>Date</label>
                    <input type="date" id="schedule-date" required>
                </div>
                <div class="form-row">
                    <div class="form-group">
                        <label>Start Time</label>
                        <input type="time" id="schedule-start" required>
                    </div>
                    <div class="form-group">
                        <label>End Time</label>
                        <input type="time" id="schedule-end" required>
                    </div>
                </div>
                
                <div class="form-group">
                    <label>Checklist Tasks</label>
                    <div class="task-input-wrapper">
                        <input type="text" id="new-task-input" placeholder="e.g. Perimeter check">
                        <button type="button" class="btn-secondary" onclick="addDraftTask()">Add</button>
                    </div>
                    <ul class="draft-task-list" id="draft-task-list">
                    </ul>
                </div>

                <div class="modal-actions">
                    <button type="button" class="btn-outline" onclick="closeModal()">Cancel</button>
                    <button type="submit" class="btn-primary">Save Schedule</button>
                </div>
            </form>
        </div>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
        import { getFirestore, collection, addDoc, getDocs, deleteDoc, doc, updateDoc, onSnapshot, query, orderBy } 
        from "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js";

        const firebaseConfig = {
            apiKey: "AIzaSyAA_tK4pYMtdKlMAGF7u-zwzsc5sWV5PdQ",
            authDomain: "egarda-49d50.firebaseapp.com",
            databaseURL: "https://egarda-49d50-default-rtdb.asia-southeast1.firebasedatabase.app",
            projectId: "egarda-49d50",
            storageBucket: "egarda-49d50.firebasestorage.app",
            messagingSenderId: "249657374353",
            appId: "1:249657374353:web:262b190dbc13cf41ccb130"
        };

        const app = initializeApp(firebaseConfig);
        const db = getFirestore(app);

        // Kirim fungsi Firebase ke file app.js secara global
        window.db = db;
        window.fbMethods = { collection, addDoc, getDocs, deleteDoc, doc, updateDoc, onSnapshot, query, orderBy };
    </script>
    <script src="app.js"></script>
</body>
</html>
