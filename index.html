<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>EGarda - Schedule App by Krisma</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;900&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <div class="app-container">
        <header class="app-header">
            <h1 class="brand-title">EGARDA</h1>
            <p id="header-date" class="date-display">Memuat tanggal...</p>
        </header>
        
        <hr class="divider">

        <main class="main-content">
            <section class="schedule-section">
                <div class="section-header">
                    <h2>Jadwal Mendatang</h2>
                    <span class="badge-info">Hari ini & Besok</span>
                </div>
                <div id="upcoming-container" class="schedule-grid">
                    <div class="empty-state">Memeriksa jadwal...</div>
                </div>
            </section>

            <section class="schedule-section" style="margin-top: 32px;">
                <div class="section-header">
                    <h2>Semua Jadwal</h2>
                    <span id="total-count" class="badge-count">0</span>
                </div>
                <div id="all-container" class="schedule-grid">
                    <div class="empty-state">Memuat data...</div>
                </div>
            </section>
        </main>

        <footer>
            <p id="quote-display" class="random-quote"></p>
        </footer>

        <button class="fab-btn" onclick="openModal()" aria-label="Tambah Jadwal">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5">
                <line x1="12" y1="5" x2="12" y2="19"></line>
                <line x1="5" y1="12" x2="19" y2="12"></line>
            </svg>
        </button>
    </div>

    <div id="modal-overlay" class="modal-overlay">
        <div class="modal-card">
            <div class="modal-header">
                <h2 id="modal-title">Jadwal Baru</h2>
                <button class="btn-close" onclick="closeModal()">&times;</button>
            </div>
            <form id="schedule-form" class="custom-form">
                <input type="hidden" id="edit-id">

                <div class="form-group">
                    <label>Tanggal</label>
                    <input type="date" id="schedule-date" required>
                </div>

                <div class="form-group">
                    <label>Shift Kerja</label>
                    <div class="shift-selector">
                        <button type="button" class="shift-btn active pagi-active" id="btn-pagi" onclick="setShift('Pagi')">☀️ Pagi</button>
                        <button type="button" class="shift-btn" id="btn-malam" onclick="setShift('Malam')">🌙 Malam</button>
                    </div>
                    <input type="hidden" id="schedule-shift" value="Pagi" required>
                </div>

                <div class="form-group">
                    <label>Unit Kerja</label>
                    <div class="custom-dropdown">
                        <div class="dropdown-selected" id="unit-selected" onclick="toggleDropdown()">Pilih Unit Kerja</div>
                        <div class="dropdown-list" id="unit-list">
                            <div class="dropdown-item" onclick="setUnit('Kantor Cabang Bangli')">Kantor Cabang Bangli</div>
                            <div class="dropdown-item" onclick="setUnit('Kantor Unit Bangli Kota')">Kantor Unit Bangli Kota</div>
                            <div class="dropdown-item" onclick="setUnit('Kantor Unit Tembuku')">Kantor Unit Tembuku</div>
                            <div class="dropdown-item" onclick="setUnit('Kantor Unit Kayuambua')">Kantor Unit Kayuambua</div>
                            <div class="dropdown-item" onclick="setUnit('Kantor Unit Penelokan')">Kantor Unit Penelokan</div>
                            <div class="dropdown-item" onclick="setUnit('Kantor Unit Kintamani')">Kantor Unit Kintamani</div>
                            <div class="dropdown-item" onclick="setUnit('Kantor Unit Catur')">Kantor Unit Catur</div>
                        </div>
                    </div>
                    <input type="hidden" id="schedule-unit" required>
                </div>

                <div class="form-group">
                    <label>Pegawai yang Digantikan</label>
                    <input type="text" id="schedule-pegawai" placeholder="Tulis nama lengkap" required>
                </div>

                <div class="form-group">
                    <label>Catatan (Opsional)</label>
                    <textarea id="schedule-notes" placeholder="Tulis instruksi tambahan..."></textarea>
                </div>

                <div class="modal-actions">
                    <button type="button" class="btn-secondary" onclick="closeModal()">Batal</button>
                    <button type="submit" class="btn-primary" id="btn-submit">Simpan</button>
                </div>
            </form>
        </div>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
        import { getFirestore, collection, addDoc, onSnapshot, query, orderBy, deleteDoc, doc, updateDoc } 
        from "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js";

        const firebaseConfig = {
            apiKey: "AIzaSyAA_tK4pYMtdKlMAGF7u-zwzsc5sWV5PdQ",
            authDomain: "egarda-49d50.firebaseapp.com",
            databaseURL: "https://egarda-49d50-default-rtdb.asia-southeast1.firebasedatabase.app",
            projectId: "egarda-49d50",
            storageBucket: "egarda-49d50.firebasestorage.app",
            messagingSenderId: "249657374353",
            appId: "1:249657374353:web:262b190dbc13cf41ccb130"
        };

        const app = initializeApp(firebaseConfig);
        const db = getFirestore(app);

        window.db = db;
        window.fb = { collection, addDoc, onSnapshot, query, orderBy, deleteDoc, doc, updateDoc };
    </script>
    <script src="app.js"></script>
</body>
</html>
